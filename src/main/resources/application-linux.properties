# ── Linux / WSL2 profile overrides ──────────────────────────────
# Activate with: java -jar ... --spring.profiles.active=linux

app.transcript.python=/usr/bin/python3

# Mail: disable by default on Linux (no SMTP configured in dev).
# Set to true and configure spring.mail.* to enable.
app.mail.enabled=false

