# ── Linux / WSL2 profile overrides ──────────────────────────────
# Activate with: java -jar ... --spring.profiles.active=linux

app.transcript.python=/usr/bin/python3

# Mail: enabled via Resend SMTP.
# La clé API doit être dans application-local.properties (gitignore) sur la machine hôte.
app.mail.enabled=true
app.base-url=https://app.neoventrix.uk

# Base URL: update this to your current cloudflared URL if email links are needed.
# app.base-url=https://xxxx.trycloudflare.com

# H2 Console: allow access from the Windows host (172.23.x.x) via WSL2 IP
spring.h2.console.settings.web-allow-others=true
