databaseChangeLog:
  - changeSet:
      id: 009
      author: dualsub
      changes:
        - createTable:
            tableName: account_tokens
            columns:
              - column:
                  name: token
                  type: VARCHAR(64)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_atoken_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: token_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: used_at
                  type: TIMESTAMP
