<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DualSub — Double Traduction YouTube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<!-- Overlays visuels -->
<div class="scanlines" aria-hidden="true"></div>
<div class="vignette"  aria-hidden="true"></div>

<div class="app">

    <!-- ═══ HEADER ═══ -->
    <header class="hdr">
        <div class="logo">
            <span class="logo-play">▶</span>
            <span class="logo-dual">DUAL</span><span class="logo-sub">SUB</span>
        </div>
        <p class="tagline" id="tagline">// TRADUCTION SIMULTANÉE &nbsp;·&nbsp; DOUBLE PISTE EN TEMPS RÉEL</p>
        <div class="header-line"></div>
    </header>

    <!-- ═══ PANNEAU CONFIG ═══ -->
    <section class="panel" id="configPanel">

        <!-- Coins décoratifs -->
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>

        <!-- URL -->
        <div class="block">
            <p class="block-label" id="labelTarget">&#x2215;&#x2215; CIBLE &nbsp;<span class="blink">_</span></p>
            <div class="url-row">
                <span class="url-icon">▶</span>
                <input type="text" id="videoUrl" autocomplete="off" spellcheck="false"
                       placeholder="https://www.youtube.com/watch?v=…" />
            </div>
        </div>

        <!-- Sélecteurs de langue -->
        <div class="block">
            <p class="block-label" id="labelLangs">&#x2215;&#x2215; LANGUES</p>
            <div class="langs-grid">

                <!-- Langue 1 — verte -->
                <div class="lang-slot" id="slot1">
                    <div class="slot-header green-header">
                        <span class="slot-num">01</span>
                        <span class="slot-name" id="slotPrimary">LANGUE PRINCIPALE</span>
                        <span class="slot-dot green-dot"></span>
                    </div>
                    <div class="flag-row" id="row1">
                        <button class="flag-btn selected-green" data-code="fr" onclick="pick(1,'fr',this)">
                            <span class="flag-icon">🇫🇷</span>
                            <span class="flag-code">FR</span>
                            <span class="flag-name">Français</span>
                        </button>
                        <button class="flag-btn" data-code="en" onclick="pick(1,'en',this)">
                            <span class="flag-icon">🇬🇧</span>
                            <span class="flag-code">EN</span>
                            <span class="flag-name">English</span>
                        </button>
                        <button class="flag-btn" data-code="es" onclick="pick(1,'es',this)">
                            <span class="flag-icon">🇪🇸</span>
                            <span class="flag-code">ES</span>
                            <span class="flag-name">Español</span>
                        </button>
                        <button class="flag-btn" data-code="it" onclick="pick(1,'it',this)">
                            <span class="flag-icon">🇮🇹</span>
                            <span class="flag-code">IT</span>
                            <span class="flag-name">Italiano</span>
                        </button>
                        <button class="flag-btn" data-code="de" onclick="pick(1,'de',this)">
                            <span class="flag-icon">🇩🇪</span>
                            <span class="flag-code">DE</span>
                            <span class="flag-name">Deutsch</span>
                        </button>
                        <button class="flag-btn" data-code="pl" onclick="pick(1,'pl',this)">
                            <span class="flag-icon">🇵🇱</span>
                            <span class="flag-code">PL</span>
                            <span class="flag-name">Polski</span>
                        </button>
                    </div>
                </div>

                <!-- Langue 2 — orange -->
                <div class="lang-slot" id="slot2">
                    <div class="slot-header orange-header">
                        <span class="slot-num">02</span>
                        <span class="slot-name" id="slotSecondary">LANGUE SECONDAIRE</span>
                        <span class="slot-dot orange-dot"></span>
                    </div>
                    <div class="flag-row" id="row2">
                        <button class="flag-btn" data-code="fr" onclick="pick(2,'fr',this)">
                            <span class="flag-icon">🇫🇷</span>
                            <span class="flag-code">FR</span>
                            <span class="flag-name">Français</span>
                        </button>
                        <button class="flag-btn" data-code="en" onclick="pick(2,'en',this)">
                            <span class="flag-icon">🇬🇧</span>
                            <span class="flag-code">EN</span>
                            <span class="flag-name">English</span>
                        </button>
                        <button class="flag-btn" data-code="es" onclick="pick(2,'es',this)">
                            <span class="flag-icon">🇪🇸</span>
                            <span class="flag-code">ES</span>
                            <span class="flag-name">Español</span>
                        </button>
                        <button class="flag-btn" data-code="it" onclick="pick(2,'it',this)">
                            <span class="flag-icon">🇮🇹</span>
                            <span class="flag-code">IT</span>
                            <span class="flag-name">Italiano</span>
                        </button>
                        <button class="flag-btn selected-orange" data-code="de" onclick="pick(2,'de',this)">
                            <span class="flag-icon">🇩🇪</span>
                            <span class="flag-code">DE</span>
                            <span class="flag-name">Deutsch</span>
                        </button>
                        <button class="flag-btn" data-code="pl" onclick="pick(2,'pl',this)">
                            <span class="flag-icon">🇵🇱</span>
                            <span class="flag-code">PL</span>
                            <span class="flag-name">Polski</span>
                        </button>
                    </div>
                </div>

            </div><!-- /langs-grid -->
        </div>

        <!-- Mode Immersion -->
        <div class="block imm-block">
            <label class="imm-label" for="immersionCheck">
                <input type="checkbox" id="immersionCheck" onchange="toggleImmersion(this)">
                <span class="imm-box"></span>
                <div class="imm-text">
                    <span id="immersionLabel" class="imm-main">MODE IMMERSION</span>
                    <span id="immersionHint"  class="imm-hint">langue de la vidéo · ma langue</span>
                </div>
            </label>
        </div>

        <!-- Bouton -->
        <div class="block action-block">
            <button class="btn-fire" id="btnProcess" onclick="processVideo()">
                <span class="fire-glyph">⚡</span>
                <span id="btnText">ANALYSER &amp; TRADUIRE</span>
                <span id="btnSpinner" class="spinner hidden"></span>
            </button>
            <div id="errorBox" class="error-box hidden"></div>
        </div>

        <!-- Barre de progression SSE (visible pendant le chargement) -->
        <div id="progressPanel" class="progress-panel hidden"></div>

    </section><!-- /configPanel -->


    <!-- ═══ LECTEUR + HUD ═══ -->
    <section class="player-section hidden" id="playerSection">

        <div class="player-wrap">
            <!-- Coins -->
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <div id="youtubePlayer"></div>
        </div>

        <!-- HUD sous-titres -->
        <div class="hud">
            <span class="corner bl"></span>
            <span class="corner br"></span>

            <!-- Barre de statut / debug -->
            <div class="hud-statusbar">
                <span id="hudStatus" class="hud-status-text"></span>
                <span id="hudTime"   class="hud-time-text"></span>
            </div>

            <div class="hud-track green-track">
                <span class="hud-badge green-badge" id="lang1Badge">FR</span>
                <span class="hud-text" id="subtitleText1">&nbsp;</span>
            </div>

            <div class="hud-sep"></div>

            <div class="hud-track orange-track">
                <span class="hud-badge orange-badge" id="lang2Badge">DE</span>
                <span class="hud-text" id="subtitleText2">&nbsp;</span>
            </div>
        </div>

        <button class="btn-back" id="btnBack" onclick="resetApp()">◄ &nbsp;RETOUR</button>

    </section>

</div><!-- /app -->

<script src="https://www.youtube.com/iframe_api"></script>
<script src="app.js?v=3"></script>
</body>
</html>
