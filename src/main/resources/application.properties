server.port=8080
spring.application.name=youtube-dual-sub

# Path to the Python script used to fetch YouTube transcripts.
# Can be absolute or relative to the application working directory.
app.transcript.script=scripts/get_transcript.py
# Default Python path (Windows). Overridden by application-linux.properties on Linux.
app.transcript.python=C:/Python314/python.exe

# ── H2 datasource (file-based — data persists across restarts) ──
spring.datasource.url=jdbc:h2:file:./data/dualsub;AUTO_RECONNECT=TRUE;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA — schema is fully managed by Liquibase ──────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ── H2 Console (dev only — http://localhost:8080/h2-console) ────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── Liquibase ────────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ── Email (SMTP) ─────────────────────────────────────────────────
# Mettre app.mail.enabled=false pour désactiver l'envoi (comptes activés immédiatement)
app.mail.enabled=true
app.mail.from=noreply@dualsub.local
# URL de base utilisée dans les liens des emails
app.base-url=http://localhost:8080

# Exemple Gmail (générez un "Mot de passe d'application" dans votre compte Google) :
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=VOTRE_EMAIL@gmail.com
spring.mail.password=VOTRE_MOT_DE_PASSE_APPLICATION
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
