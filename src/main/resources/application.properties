server.port=8080
spring.application.name=youtube-dual-sub

# Path to the Python script used to fetch YouTube transcripts.
# Can be absolute or relative to the application working directory.
app.transcript.script=scripts/get_transcript.py
app.transcript.python=C:/Python312/python.exe

# ── H2 datasource (file-based — data persists across restarts) ──
spring.datasource.url=jdbc:h2:file:./data/dualsub;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA — schema is fully managed by Liquibase ──────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ── H2 Console (dev only — http://localhost:8080/h2-console) ────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── Liquibase ────────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
